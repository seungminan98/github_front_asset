<!DOCTYPE html>
  <html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자산관리 고찰</title>
    <style>
      body {
        font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
            color: #333;
      margin: 0;
      padding: 0;
}
    header {
            background: #2c3e50;
      color: white;
      padding: 40px 20px;
      text-align: center;
}
    header h1 {
            margin: 0;
      font-size: 2em;
    }
    header p {
            margin-top: 10px;
      font-size: 1.1em;
      opacity: 0.8;
}
    main {
            max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
}
    .card {
            background: white;
      border-radius: 10px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
    .card h2 {
            color: #2c3e50;
      margin-top: 0;
    }
    footer {
            text-align: center;
      padding: 20px;
      color: #888;
      font-size: 0.9em;
}
  </style>
    </head>
    <body>
      <header>
        <h1>자산관리, 어떻게 해야 할까?</h1>
        <p>나의 자산관리 고찰 정적 사이트</p>
      </header>
      <main>
        <div class="card">
          <h2>소개</h2>
          <p>이 사이트는 자산관리를 어떻게 하는 것이 좋은가에 대해 고찰해본 내용을 가볍게 깃허브 페이지로 배포한 정적 사이트입니다.</p>
        </div>
        <div class="card">
          <h2>핵심 원칙</h2>
          <p>자산관리의 핵심은 <strong>수입 &gt; 지출</strong>을 유지하고, 잉여 자산을 꾸준히 투자하는 것입니다.</p>
        </div>
        <div class="card">
          <h2>시작하는 방법</h2>
          <p>가계부 작성, 비상금 확보, 그리고 장기적인 투자 습관을 통해 자산을 꾸준히 늘려가는 것이 중요합니다.</p>
        </div>
      </main>
      <footer>
        <p>GitHub Pages로 배포된 정적 사이트 &copy; 2026</p>
      </footer>
    </body>
    </html>
